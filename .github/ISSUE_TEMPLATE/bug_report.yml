name: Bug report
description: Report a reproducible problem with the extension
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please do not include any
        personal data, and do not report security issues here (see SECURITY.md).
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: e.g. Chrome 126, Firefox 128
    validations:
      required: true
  - type: input
    id: extension-version
    attributes:
      label: Extension version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: no-personal-data
    attributes:
      label: Confirmation
      options:
        - label: This report contains no personal data (no member ids, no account-tied identifiers).
          required: true
