name: Feature request
description: Suggest an improvement or a new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please open a feature request before starting work, so the approach can
        be agreed on first.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to accomplish, and what is missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy impact
      options:
        - label: This request does not require the extension to reach any host other than www.linkedin.com and 127.0.0.1, or if it does, I understand that needs a PRIVACY.md change and discussion first.
          required: true
